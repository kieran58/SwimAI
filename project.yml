name: SwimAI

options:
  bundleIdPrefix: com.kieran
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  SwimAI:
    type: application
    platform: iOS
    sources:
      - SwimAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID}
        PRODUCT_NAME: "Swim AI"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: ${PROVISIONING_PROFILE_SPECIFIER}
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Swim AI reads your swim workouts to show your history."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Swim AI writes your swim sessions to Apple Health."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    entitlements:
      path: SwimAI/SwimAI.entitlements
